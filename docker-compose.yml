version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: cvis-backend
    ports:
      - "3001:3001"
    volumes:
      # Mount server code for hot reload during development
      - ./server:/app/server
      # Mount node_modules to avoid conflicts
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
      - PORT=3001
    restart: unless-stopped
    # Keep stdin open for interactive debugging if needed
    stdin_open: true
    tty: true

volumes:
  backend_node_modules:
