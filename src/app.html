<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/cvis.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      globalThis.runInterpreter =
        globalThis.runInterpreter ||
        (async function runInterpreter(code, breakpoints = []) {
          const response = await fetch('/api/trace', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: String(code || ''), breakpoints })
          });

          if (!response.ok) {
            throw new Error(`Trace failed (${response.status})`);
          }

          return response.json();
        });
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
